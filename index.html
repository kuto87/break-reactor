<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050611">
  <title>Break Reactor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="gameShell" aria-label="Break Reactor browser game">
    <canvas id="gameCanvas" width="420" height="720"></canvas>

    <button id="pauseButton" class="icon-button" type="button" aria-label="pause" title="Pause">||</button>

    <div id="upgradePanel" aria-label="Coin upgrades">
      <button id="buyLaserButton" class="upgrade-button" type="button">
        <span>LASER</span>
        <strong>20</strong>
      </button>
      <button id="buyShieldButton" class="upgrade-button" type="button">
        <span>SHIELD</span>
        <strong>30</strong>
      </button>
      <button id="shopButton" class="upgrade-button shop-open-button" type="button">
        <span>SHOP</span>
        <strong>COIN</strong>
      </button>
    </div>

    <div id="pauseOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-panel">
        <h1>PAUSED</h1>
        <button id="resumeButton" type="button">Resume</button>
        <button id="restartPauseButton" type="button">Restart</button>
      </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-panel">
        <h1>GAME OVER</h1>
        <dl id="gameOverStats"></dl>
        <button id="restartGameButton" type="button">Play Again</button>
      </div>
    </div>

    <div id="shopOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-panel shop-panel">
        <h1>COIN SHOP</h1>
        <p id="shopCoinText">Coins 0</p>
        <div class="shop-grid">
          <button id="shopLaserButton" type="button"><span>Laser 5s</span><strong>20</strong></button>
          <button id="shopShieldButton" type="button"><span>Shield +1</span><strong>30</strong></button>
          <button id="shopWideButton" type="button"><span>Wide 10s</span><strong>18</strong></button>
          <button id="shopMultiButton" type="button"><span>Multi +2</span><strong>24</strong></button>
        </div>
        <button id="closeShopButton" type="button">Close</button>
      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
