<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050611">
  <title>Break Reactor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="gameShell" aria-label="Break Reactor browser game">
    <canvas id="gameCanvas" width="420" height="720"></canvas>

    <button id="pauseButton" class="icon-button" type="button" aria-label="一時停止" title="一時停止">||</button>

    <div id="upgradePanel" aria-label="コイン強化">
      <button id="buyLaserButton" class="upgrade-button" type="button">
        <span>レーザー</span>
        <strong>20</strong>
      </button>
      <button id="buyShieldButton" class="upgrade-button" type="button">
        <span>シールド</span>
        <strong>30</strong>
      </button>
      <button id="shopButton" class="upgrade-button shop-open-button" type="button">
        <span>ショップ</span>
        <strong>コイン</strong>
      </button>
    </div>

    <div id="pauseOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-panel">
        <h1>一時停止</h1>
        <button id="resumeButton" type="button">再開</button>
        <button id="restartPauseButton" type="button">リスタート</button>
      </div>
    </div>

    <div id="gameOverOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-panel">
        <h1>ゲームオーバー</h1>
        <dl id="gameOverStats"></dl>
        <button id="restartGameButton" type="button">もう一度</button>
      </div>
    </div>

    <div id="shopOverlay" class="overlay hidden" aria-hidden="true">
      <div class="overlay-panel shop-panel">
        <h1>コインショップ</h1>
        <p id="shopCoinText">所持コイン 0</p>
        <div class="shop-grid">
          <button id="shopLaserButton" type="button"><span>レーザー 5秒</span><strong>20</strong></button>
          <button id="shopShieldButton" type="button"><span>シールド +1</span><strong>30</strong></button>
          <button id="shopWideButton" type="button"><span>ワイド 10秒</span><strong>18</strong></button>
          <button id="shopMultiButton" type="button"><span>マルチ +2</span><strong>24</strong></button>
        </div>
        <button id="closeShopButton" type="button">閉じる</button>
      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
